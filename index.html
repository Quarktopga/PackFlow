<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <script>
    // Applique le thème (clair/sombre/système) avant le premier paint pour
    // éviter tout flash. Doit rester synchrone et se trouver avant les CSS.
    (function () {
      var pref = localStorage.getItem("packflow-theme") || "system";
      var resolved = pref === "system"
        ? (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
        : pref;
      document.documentElement.setAttribute("data-theme", resolved);
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
  <title>PackFlow — Pilote ton déménagement</title>
  <meta name="description" content="Gère tes cartons, ton rétro-planning et le volume de ton déménagement, carton par carton.">

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f6f4ef">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#10131c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PackFlow">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="./css/tokens.css">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/landing.css">

  <!-- Supabase client + génération/lecture de QR codes -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
</head>
<body>
  <div id="app">
    <div class="screen" style="display:flex;align-items:center;justify-content:center;min-height:100vh;">
      <div class="spinner"></div>
    </div>
  </div>
  <noscript>PackFlow nécessite JavaScript pour fonctionner.</noscript>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
